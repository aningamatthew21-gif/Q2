# ─────────────────────────────────────────────────────────────────────────
# nginx.conf — frontend container reverse proxy + SPA fallback
#
# Purpose:
#   1. Serve the Vite build artefact (/usr/share/nginx/html/index.html
#      and assets) as static files.
#   2. Proxy /api/* requests to the backend container — keeps the
#      browser making same-origin requests so we never hit CORS in
#      production. Mirror the Vite dev-server proxy behaviour.
#   3. Proxy /socket.io/* to the backend (Socket.IO real-time).
#   4. SPA fallback — any non-asset, non-API URL serves index.html so
#      React-Router-style deep links resolve client-side.
#
# Override the backend hostname at runtime via the env var `API_BACKEND`
# in docker-compose (default: http://midsa-backend:3001).
# ─────────────────────────────────────────────────────────────────────────

server {
  listen 80;
  server_name _;

  # ── Static assets — long cache, fingerprinted filenames from Vite ────
  location /assets/ {
    root /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ── Backend API — reverse proxy with timeouts ────────────────────────
  location /api/ {
    proxy_pass http://midsa-backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Forward the correlation ID from upstream LBs (or generate one)
    proxy_set_header X-Request-ID      $request_id;
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  # ── Socket.IO — needs WebSocket upgrade ──────────────────────────────
  location /socket.io/ {
    proxy_pass http://midsa-backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;
    proxy_read_timeout 7200s;   # long-lived WS connection
  }

  # ── SPA fallback — every other path serves index.html ───────────────
  # Browser → /quoting → nginx serves index.html → React Router takes over
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # ── Hide nginx version in Server header (CIS 2.5) ────────────────────
  server_tokens off;
}
